<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>� HOG-U - Bangalore's Sports Meal Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #fdb833 100%);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.95;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .location-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-size: 0.9em;
            font-weight: 600;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.5);
            background: linear-gradient(135deg, #f7931e 0%, #fdb833 100%);
        }

        button:active {
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            color: white;
            display: none;
            font-size: 1.2em;
            margin: 30px 0;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ff6b35;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #fdb833);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            border-color: #ff6b35;
        }

        .activity-type {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 800;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .activity-name {
            font-size: 1.8em;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }

        .metric {
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            transition: all 0.3s ease;
        }

        .metric:hover {
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8e0 100%);
        }

        .metric-label {
            font-size: 0.75em;
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meal-recommendation {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #fdb833 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .meal-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .meal-text {
            line-height: 1.8;
            font-weight: 600;
        }

        .action-link {
            display: inline-block;
            background: white;
            color: #ff6b35;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            margin-top: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .action-link:hover {
            background: #ff6b35;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }

        .empty-icon {
            font-size: 5em;
            margin-bottom: 25px;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .empty-state p {
            opacity: 0.95;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
            }

            .subtitle {
                font-size: 1em;
            }

            .recommendations {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .metrics {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            padding: 30px;
            opacity: 0.9;
            font-weight: 500;
        }

        .intensity-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 800;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .intensity-high {
            background: linear-gradient(135deg, #ff6b35 0%, #ff4757 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        .intensity-moderate {
            background: linear-gradient(135deg, #f7931e 0%, #ffa500 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(247, 147, 30, 0.3);
        }

        .intensity-low {
            background: linear-gradient(135deg, #51cf66 0%, #2ecc71 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(81, 207, 102, 0.3);
        }

        /* Bangalore-themed accent */
        .bangalore-accent {
            color: #ff6b35;
            font-weight: 800;
        }

        .divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b35, transparent);
            margin: 20px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>� HOG-U</h1>
            <p class="subtitle">Bangalore's Sports Nutrition Guide</p>
            <div class="location-badge">📍 Silicon Valley of India</div>
        </header>

        <div class="controls">
            <button onclick="refreshRecommendations()">⚡ Refresh Workouts</button>
            <button onclick="exportJSON()">� Export Data</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching your Strava activities...</p>
        </div>

        <div id="content"></div>

        <div class="footer">
            <p>💪 Train Hard. Eat Smart. Dominate the Park! 🏅</p>
            <p style="font-size: 0.9em; margin-top: 10px;">From the Fitness Community of Bangalore</p>
        </div>
    </div>

    <script>
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function getIntensityBadge(intensity) {
            if (intensity > 18) return 'intensity-high';
            if (intensity > 10) return 'intensity-moderate';
            return 'intensity-low';
        }

        function renderRecommendations(recommendations) {
            const content = document.getElementById('content');
            
            if (!recommendations || recommendations.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏃</div>
                        <h2>No Workouts Yet</h2>
                        <p>Click "⚡ Refresh Workouts" to sync your latest activities from Strava</p>
                        <button onclick="refreshRecommendations()" style="width: 200px;">Refresh Now</button>
                    </div>
                `;
                return;
            }

            let html = '<div class="recommendations">';
            
            recommendations.forEach(rec => {
                const intensityClass = getIntensityBadge(rec.intensity_index);
                const recoveryLevel = rec.meal_recommendation.split(':')[0];
                
                // Get meal emoji based on recovery level
                let mealEmoji = '🍽️';
                if (recoveryLevel.includes('1')) mealEmoji = '🥗';
                else if (recoveryLevel.includes('2')) mealEmoji = '🍲';
                else if (recoveryLevel.includes('4')) mealEmoji = '🥩';
                
                html += `
                    <div class="card">
                        <span class="activity-type">� ${rec.activity_type.toUpperCase()}</span>
                        <div class="activity-name">${rec.activity_name}</div>
                        
                        <div class="divider"></div>
                        
                        <div class="metrics">
                            <div class="metric">
                                <div class="metric-label">📏 Distance</div>
                                <div class="metric-value">${rec.distance_km.toFixed(2)}</div>
                                <div style="font-size: 0.8em; color: #666; margin-top: 4px;">km</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">⛰️ Elevation</div>
                                <div class="metric-value">${rec.elevation_gain.toFixed(0)}</div>
                                <div style="font-size: 0.8em; color: #666; margin-top: 4px;">meters</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">⚡ Intensity</div>
                                <div class="metric-value">${rec.intensity_index.toFixed(2)}</div>
                                <div style="font-size: 0.8em; color: #666; margin-top: 4px;">m/km</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">💪 Recovery</div>
                                <div class="metric-value">${recoveryLevel}</div>
                                <div style="font-size: 0.8em; color: #666; margin-top: 4px;">Level</div>
                            </div>
                        </div>

                        <span class="intensity-badge ${intensityClass}">
                            ${intensityClass === 'intensity-high' ? '🔥 MAX' : intensityClass === 'intensity-moderate' ? '⚡ PUSH' : '✅ LIGHT'} INTENSITY
                        </span>

                        <div class="divider"></div>

                        <div class="meal-recommendation">
                            <div class="meal-icon">${mealEmoji}</div>
                            <div class="meal-text"><strong>BANGALORE SPECIAL:</strong> ${rec.meal_recommendation}</div>
                        </div>

                        <a href="${rec.zomato_link}" target="_blank" class="action-link">� Order on Zomato</a>
                    </div>
                `;
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function refreshRecommendations() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            fetch('/api/refresh', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                if (data.status === 'success') {
                    renderRecommendations(data.results);
                    alert(`⚡ ${data.message}`);
                } else {
                    alert(`❌ Error: ${data.message}`);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                console.error('Error:', error);
                alert('❌ Failed to refresh. Make sure Strava is authenticated.');
            });
        }

        function exportJSON() {
            fetch('/api/activities')
                .then(response => response.json())
                .then(data => {
                    const dataStr = JSON.stringify(data, null, 2);
                    const dataBlob = new Blob([dataStr], {type: 'application/json'});
                    const url = URL.createObjectURL(dataBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `hogu_bangalore_${new Date().toISOString().split('T')[0]}.json`;
                    link.click();
                });
        }

        // Load recommendations on page load
        window.addEventListener('load', () => {
            fetch('/api/activities')
                .then(response => response.json())
                .then(data => {
                    renderRecommendations(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                    renderRecommendations([]);
                });
        });
    </script>
</body>
</html>

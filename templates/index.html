<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HOG-U Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        h1 { font-size: 2em; font-weight: 700; }
        .location { color: #aaa; font-size: 0.9em; margin-top: 4px; }
        .controls { margin-bottom: 30px; display: flex; gap: 12px; }
        button { background: #1a7f63; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 600; transition: 0.2s; }
        button:hover { background: #0f5c47; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; border-top: 3px solid #1a7f63; transition: 0.3s; }
        .card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(26,127,99,0.2); }
        .activity-type { display: inline-block; background: rgba(26,127,99,0.2); color: #4ade80; padding: 6px 12px; border-radius: 6px; font-size: 0.8em; font-weight: 700; margin-bottom: 12px; }
        .activity-name { font-size: 1.5em; font-weight: 700; margin-bottom: 16px; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .metric { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; }
        .metric-val { font-size: 1.3em; font-weight: 700; }
        .metric-label { font-size: 0.75em; color: #999; margin-top: 6px; }
        .meal { background: rgba(26,127,99,0.15); border: 1px solid rgba(26,127,99,0.3); border-radius: 8px; padding: 16px; margin: 16px 0; }
        .meal-title { font-size: 0.75em; color: #4ade80; font-weight: 700; text-transform: uppercase; }
        .meal-name { font-size: 1.2em; font-weight: 700; margin-top: 4px; }
        .meal-desc { font-size: 0.9em; color: #ccc; margin-top: 8px; }
        .btn-order { display: inline-block; background: rgba(26,127,99,0.2); color: #4ade80; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: 0.2s; border: 1px solid rgba(26,127,99,0.4); }
        .btn-order:hover { background: rgba(26,127,99,0.3); color: #5fd990; }
        .empty { text-align: center; padding: 60px 20px; color: #666; }
        .empty-icon { font-size: 3em; margin-bottom: 16px; }
        .bio-env { background: rgba(255,255,255,0.04); padding: 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9em; }
        .bio-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        .bio-item { padding: 8px; background: rgba(255,255,255,0.02); border-radius: 6px; }
        .bio-label { font-size: 0.7em; color: #999; font-weight: 600; text-transform: uppercase; }
        .bio-value { font-size: 0.95em; color: #ddd; margin-top: 4px; }
        .sweat-critical { color: #ef4444; font-weight: 700; }
        .sweat-normal { color: #4ade80; font-weight: 700; }
        footer { text-align: center; margin-top: 60px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>HOG-U</h1>
                <p class="location">📍 Bangalore, India</p>
            </div>
            <div style="text-align: right; color: #aaa;">
                <div>🟢 Strava Connected</div>
            </div>
        </header>
        <div class="controls">
            <button onclick="syncWorkouts()">⟳ Sync Workouts</button>
            <button onclick="exportJSON()">↓ Export Data</button>
        </div>
        <div id="content"></div>
        <footer>Performance nutrition • Powered by Strava</footer>
    </div>
    <script>
        function renderCards(data) {
            const html = document.getElementById('content');
            if (!data || data.length === 0) {
                html.innerHTML = '<div class="empty"><div class="empty-icon">🏃</div><h2>No Activities</h2><p>Click "Sync Workouts" to load from Strava</p></div>';
                return;
            }
            let output = '<div class="cards">';
            data.forEach(a => {
                const meal = a.meal_recommendation || 'No recommendation';
                const mealName = meal.split('.').pop().trim();
                const sweatClass = a.sweat_status === 'CRITICAL' ? 'sweat-critical' : 'sweat-normal';
                output += `<div class="card">
                    <div class="activity-type">${a.activity_type || 'Workout'}</div>
                    <div class="activity-name">${a.activity_name || 'Activity'}</div>
                    
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-val">${a.distance_km?.toFixed(1) || 0}</div>
                            <div class="metric-label">km</div>
                        </div>
                        <div class="metric">
                            <div class="metric-val">${a.elevation_gain?.toFixed(0) || 0}</div>
                            <div class="metric-label">m elev</div>
                        </div>
                        <div class="metric">
                            <div class="metric-val">${a.intensity_index?.toFixed(1) || 0}</div>
                            <div class="metric-label">intensity</div>
                        </div>
                    </div>
                    
                    <div class="bio-env">
                        <div style="font-weight: 700; margin-bottom: 12px; color: #4ade80;">📊 BIO-ENVIRONMENTAL DATA</div>
                        <div class="bio-row">
                            <div class="bio-item">
                                <div class="bio-label">🕐 Start Time</div>
                                <div class="bio-value">${a.start_time || 'N/A'}</div>
                            </div>
                            <div class="bio-item">
                                <div class="bio-label">🍴 Meal Window</div>
                                <div class="bio-value">${a.meal_window || 'N/A'}</div>
                            </div>
                        </div>
                        <div class="bio-row">
                            <div class="bio-item">
                                <div class="bio-label">📍 Location</div>
                                <div class="bio-value">${a.location || 'Bangalore'}</div>
                            </div>
                            <div class="bio-item">
                                <div class="bio-label">🌡 Temperature</div>
                                <div class="bio-value">${a.temperature?.toFixed(1) || 'N/A'}°C</div>
                            </div>
                        </div>
                        <div class="bio-row">
                            <div class="bio-item">
                                <div class="bio-label">� Humidity</div>
                                <div class="bio-value">${a.humidity?.toFixed(0) || 'N/A'}%</div>
                            </div>
                            <div class="bio-item">
                                <div class="bio-label" style="text-align: right;">💦 Sweat Status</div>
                                <div class="bio-value ${sweatClass}">${a.sweat_status || 'NORMAL'}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="meal">
                        <div class="meal-title">🍽 Recommended Meal</div>
                        <div class="meal-name">${mealName}</div>
                        <div class="meal-desc">${meal}</div>
                    </div>
                    
                    <a href="${a.zomato_link || '#'}" target="_blank" class="btn-order">Order on Zomato →</a>
                </div>`;
            });
            output += '</div>';
            html.innerHTML = output;
        }
        function syncWorkouts() {
            fetch('/api/refresh', { method: 'POST' })
                .then(r => r.json())
                .then(d => renderCards(d.results || []))
                .catch(e => alert('Error: ' + e));
        }
        function exportJSON() {
            fetch('/api/activities')
                .then(r => r.json())
                .then(d => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'}));
                    a.download = 'hogu_' + new Date().toISOString().split('T')[0] + '.json';
                    a.click();
                });
        }
        window.addEventListener('load', () => {
            fetch('/api/activities')
                .then(r => r.json())
                .then(d => renderCards(d))
                .catch(() => renderCards([]));
        });
    </script>
</body>
</html>
